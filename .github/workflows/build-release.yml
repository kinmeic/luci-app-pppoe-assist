name: Build and Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  OPENWRT_VERSION: 24.10.0
  OPENWRT_TARGET: x86/64
  OPENWRT_ARCH: x86-64
  SDK_NAME: openwrt-sdk-24.10.0-x86-64_gcc-13.3.0_musl.Linux-x86_64

jobs:
  build:
    name: OpenWrt 24.10.0 x86_64
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install host tools
        run: |
          sudo apt-get update
          sudo apt-get install -y zstd build-essential clang flex bison g++ gawk \
            gcc-multilib gettext git libncurses5-dev libssl-dev \
            rsync unzip zlib1g-dev file wget jq

      - name: Download OpenWrt SDK
        run: |
          set -eu
          base="https://downloads.openwrt.org/releases/${OPENWRT_VERSION}/targets/x86/64"
          wget -nv "${base}/${SDK_NAME}.tar.zst"
          echo "94f55f15599b57e3b341681d6deffa8e6ce38fc829e0ed14ad5c4f4a4d85a4dc  ${SDK_NAME}.tar.zst" | sha256sum -c -
          tar --zstd -xf "${SDK_NAME}.tar.zst"
          mv "${SDK_NAME}" sdk

      - name: Prepare package source
        run: |
          set -eu
          mkdir -p sdk/customfeed/applications/luci-app-pppoe-assist
          rsync -a --delete \
            --exclude '.git' \
            --exclude '.github' \
            --exclude 'sdk' \
            --exclude '*.tar.zst' \
            --exclude 'sha256sums' \
            ./ sdk/customfeed/applications/luci-app-pppoe-assist/

      - name: Update feeds
        working-directory: sdk
        run: |
          set -eu
          echo "src-link custom $(pwd)/customfeed" >> feeds.conf.default
          ./scripts/feeds update -a
          ./scripts/feeds install -a -p custom
          ./scripts/feeds install luci-base

      - name: Build package
        working-directory: sdk
        run: |
          set -eu
          make defconfig
          make package/feeds/custom/luci-app-pppoe-assist/compile V=s

      - name: Collect artifacts
        run: |
          set -eu
          mkdir -p artifacts
          find sdk/bin/packages -type f -name '*.ipk' -exec cp -v {} artifacts/ \;
          test "$(find artifacts -type f -name '*.ipk' | wc -l)" -gt 0

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: luci-app-pppoe-assist-openwrt-${{ env.OPENWRT_VERSION }}-x86_64
          path: artifacts/*

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -eu
          tag="${GITHUB_REF_NAME}"
          notes="OpenWrt ${OPENWRT_VERSION} x86_64 package build for ${tag}."
          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" artifacts/* --clobber
          else
            gh release create "$tag" artifacts/* --title "$tag" --notes "$notes"
          fi
